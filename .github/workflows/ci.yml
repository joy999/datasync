name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    
    services:
      nats:
        image: nats:latest
        ports:
          - 4222:4222
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: datasync_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      matrix:
        go-version: [ '1.25.x' ]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}

    - name: Install required tools
      run: |
        sudo apt-get update
        sudo apt-get install -y postgresql-client netcat-traditional

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Wait for services
      run: |
        # Wait for PostgreSQL
        for i in {1..30}; do
          pg_isready -h localhost -p 5432 -U postgres && break
          echo "Waiting for PostgreSQL... ($i/30)"
          sleep 1
        done
        if ! pg_isready -h localhost -p 5432 -U postgres; then
          echo "PostgreSQL did not become ready within 30 seconds"
          exit 1
        fi
        # Wait for NATS
        for i in {1..30}; do
          nc -z localhost 4222 && break
          echo "Waiting for NATS... ($i/30)"
          sleep 1
        done
        if ! nc -z localhost 4222; then
          echo "NATS did not become ready within 30 seconds"
          exit 1
        fi
        echo "All services are ready!"

    - name: Run unit tests
      run: go test -v -timeout 10m ./pkg/... ./drivers/...
      env:
        SKIP_PG_TEST: "1"
        NATS_URL: nats://localhost:4222
        TEST_PG_HOST: localhost
        TEST_PG_PORT: "5432"
        TEST_PG_DB: datasync_test
        TEST_PG_USER: postgres
        TEST_PG_PASSWORD: postgres

    - name: Run example tests
      run: go test -v -timeout 5m -run "^TestExample" ./pkg/... ./drivers/...
      env:
        SKIP_PG_TEST: "1"
        NATS_URL: nats://localhost:4222
        TEST_PG_HOST: localhost
        TEST_PG_PORT: "5432"
        TEST_PG_DB: datasync_test
        TEST_PG_USER: postgres
        TEST_PG_PASSWORD: postgres

    - name: Run integration tests
      run: go test -v -timeout 10m -tags=integration ./pkg/... ./drivers/...
      env:
        SKIP_PG_TEST: "1"
        NATS_URL: nats://localhost:4222
        TEST_PG_HOST: localhost
        TEST_PG_PORT: "5432"
        TEST_PG_DB: datasync_test
        TEST_PG_USER: postgres
        TEST_PG_PASSWORD: postgres

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.x'

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Run benchmarks
      run: go test -bench=. -benchmem -run=^$ ./... | tee benchmark.txt

    - name: Upload benchmark results
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results
        path: benchmark.txt

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.x'

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: v1.64.8
        args: --timeout=5m

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.x'

    - name: Build
      run: go build -v ./...

    - name: Test build examples
      run: |
        cd examples/simple
        go build -v .

  proto-check:
    name: Proto Check
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.x'

    - name: Install Protoc
      uses: arduino/setup-protoc@v3
      with:
        version: '24.x'

    - name: Install Go tools
      run: |
        go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11

    - name: Generate Proto
      run: |
        export PATH=$PATH:$(go env GOPATH)/bin
        protoc --proto_path=. --go_out=. --go_opt=paths=source_relative proto/datasync.proto

    - name: Check generated files are up to date
      run: |
        git diff --exit-code proto/datasync.pb.go || (echo "Generated proto files are out of date. Please run 'protoc' and commit the changes." && exit 1)

