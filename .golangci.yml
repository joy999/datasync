run:
  timeout: 5m
  go: '1.23'

linters:
  enable:
    - gofmt
    - govet
    - errcheck
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - gosec
    - unconvert
    - dupl
    - goconst
    - gocyclo
    - goimports
    - misspell
    - nakedret
    - prealloc
    - copyloopvar

linters-settings:
  gofmt:
    simplify: true
  govet:
    enable-all: true
    disable:
      - shadow
      - fieldalignment
  gocyclo:
    min-complexity: 15
  dupl:
    threshold: 100
  goconst:
    min-len: 3
    min-occurrences: 3
  misspell:
    locale: US

issues:
  exclude-rules:
    # Exclude some linters from running on tests files
    - path: _test\.go
      linters:
        - gosec
        - dupl
        - gocyclo
        - errcheck
        - govet
        - copyloopvar
    # SQL string formatting in postgres driver - table names are validated
    - path: drivers/postgres/.*\.go
      linters:
        - gosec
      text: "G201"

  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
